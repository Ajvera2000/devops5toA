version: '3.9'

services:

  dbclase:
    image: postgres:15-alpine
    container_name: postgres_dbclase
    environment:
      - TZ=America/Guayaquil
      - POSTGRES_DB=ejemplo1
      - POSTGRES_USER=quinto
      - POSTGRES_PASSWORD=123
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_dbclase:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432" # Expone el puerto por si quieres conectar DBeaver o DataGrip desde tu host
    networks:
      - net_dbclase
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_dbclase
    environment:
      - PGADMIN_DEFAULT_EMAIL=ajb.vera@yavirac.edu.ec
      - PGADMIN_DEFAULT_PASSWORD=1234
    volumes:
      - pg_pgadmin_data:/var/lib/pgadmin
    ports:
      - "8080:80" # Podrás acceder a pgAdmin desde http://localhost:8080
    networks:
      - net_dbclase

volumes:
  pg_dbclase:      # Eliminado el doble ':' y el flag 'external' para desarrollo local sencillo
  pg_pgadmin_data: # Añadido para que no se pierda la config de pgAdmin al apagar el contenedor

networks:
  net_dbclase:     # Eliminado 'external: true' para que compose cree la red automáticamente